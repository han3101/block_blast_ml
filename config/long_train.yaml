# Extended run preset — override on top of default.yaml.
total_timesteps: 40000000
vec_env: async

# Larger rollout window → 14×512 = 7168 transitions per update (vs 1792 default).
# Same effective batch size as reference's 64 envs × 128 steps, without
# oversubscribing the CPU. n_envs stays at hardware default (cores - 2 = 14).
rollout_steps: 512
batch_size: 2048
n_epochs: 4
