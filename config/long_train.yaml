# Extended run — 40M steps, larger batch. Override on top of default.yaml.
total_timesteps: 40000000
batch_size: 2048
n_epochs: 4

# Throughput: subprocess-per-env parallelism + reference-scale env count.
# Benchmarked ~2.9x the sync/14-env rollout on a 16-core box (~8k fps).
vec_env: async
n_envs: 48
