# PPO hyperparameters
total_timesteps: 2000000
n_envs: 16
rollout_steps: 128
batch_size: 512
n_epochs: 4
gamma: 0.997
gae_lambda: 0.95
clip_coef: 0.2
ent_coef: 0.03
ent_coef_final: 0.01
vf_coef: 0.5
max_grad_norm: 0.5
normalize_returns: true

# Optimizer
lr: 0.0003
lr_warmup_frac: 0.05
target_kl: 0.02

# Reward shaping
line_clear_bonus: 0.0
game_over_penalty: 0.0
hole_coef: 0.0
survival_bonus: 0.0

# Environment
env_mode: at_least_one
vec_env: sync          # "async" = subprocess per env (faster rollout); see long_train.yaml
seed: 42

# Eval (deterministic, fixed-seed, vs greedy baseline)
eval_interval: 50
eval_episodes: 64
eval_seed_offset: 0

# Hardware (auto = detected at runtime)
device: auto
amp: false
compile: false

# Logging / checkpointing
log_interval: 1
checkpoint_interval: 100
keep_checkpoints: 5
